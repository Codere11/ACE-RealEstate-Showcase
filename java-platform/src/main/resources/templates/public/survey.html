<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE e-Counter</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            color: #22252A;
            background: #0C0D10;
        }
        .agent-hero {
            padding: 10px 18px 4px;
            background:
                radial-gradient(1200px 400px at 18% -80px, rgba(193,164,108,.12), transparent 60%),
                linear-gradient(180deg, #121417 0%, #0C0D10 70%);
            border-bottom: 1px solid rgba(193,164,108,.18);
        }
        .agent-hero__inner {
            width: 100%;
            display: grid;
            gap: 8px;
        }
        .agent-hero__brand {
            color: rgba(250,250,247,.92);
            font-size: .92rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        .agent-hero__camera {
            width: min(100%, 520px);
            aspect-ratio: 16 / 9;
            justify-self: center;
            border-radius: 18px;
            background: #020303;
            border: 1px solid rgba(255,255,255,.09);
            box-shadow: 0 24px 60px rgba(0,0,0,.38);
            position: relative;
            overflow: hidden;
        }
        .agent-hero__camera-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            padding: 20px;
            background: linear-gradient(180deg, rgba(2,3,3,.18), rgba(2,3,3,.5));
            color: #F9FAFB;
        }
        .agent-hero__camera-eyebrow {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: rgba(249,250,251,.72);
        }
        .agent-hero__camera-title {
            font-size: clamp(16px, 2vw, 22px);
            font-weight: 700;
            line-height: 1.25;
            max-width: 28rem;
        }
        .agent-page { padding: 4px 14px 18px; }
        .survey-card {
            max-width: 980px;
            margin: 8px auto 12px;
            background: #FFFFFF;
            border: 1px solid #E6E2D6;
            border-radius: 16px;
            box-shadow: 0 24px 60px rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.12) inset;
            padding: 18px;
        }
        .survey-container {
            max-width: 760px;
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #E7E1D2;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #C1A46C, #A98C58);
            transition: width .2s ease;
        }
        .progress-text,
        .question-subtitle,
        .meta,
        .muted {
            color: #6B7280;
        }
        .takeover-banner {
            display: none;
            border: 1px solid #E6D4A7;
            background: #FBF5E7;
            color: #5E4A20;
            border-radius: 14px;
            padding: 12px 14px;
            font-weight: 700;
        }
        .question-title {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            margin: 0 0 14px;
            line-height: 1.35;
            text-align: center;
        }
        .question-subtitle {
            margin: 0;
            text-align: center;
            font-size: 15px;
        }
        .choices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }
        .choice-button {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #E6E2D6;
            border-radius: 12px;
            background: #FFFFFF;
            font-size: 16px;
            color: #374151;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
        }
        .choice-button:hover {
            border-color: #C1A46C;
            background: #FBF7EE;
            color: #5E4A20;
        }
        .choice-button:disabled {
            opacity: .65;
            cursor: wait;
        }
        .survey-answer {
            display: grid;
            gap: 10px;
        }
        .takeover-chat {
            display: none;
            gap: 14px;
        }
        .thread {
            display: grid;
            gap: 10px;
            padding: 14px;
            border-radius: 16px;
            background: #F8F7F3;
            border: 1px solid #E6E2D6;
            max-height: 420px;
            min-height: 120px;
            overflow-y: auto;
        }
        .bubble {
            max-width: 82%;
            border-radius: 14px;
            padding: 12px 14px;
            border: 1px solid #E6E2D6;
            background: #FFFFFF;
        }
        .bubble.user { margin-left: auto; background: #F4F8FF; border-color: #C8D9FF; }
        .bubble.assistant { margin-right: auto; }
        .bubble.staff { margin-right: auto; background: #FBF5E7; border-color: #E6D4A7; }
        .bubble .meta {
            font-size: 12px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .05em;
            font-weight: 700;
        }
        .composer {
            display: grid;
            gap: 10px;
        }
        .composer textarea {
            width: 100%;
            min-height: 100px;
            border-radius: 14px;
            border: 1px solid #D7D0C0;
            padding: 14px;
            font: inherit;
            resize: vertical;
        }
        .composer-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-button {
            padding: 12px 18px;
            border-radius: 999px;
            border: 1px solid #D7D0C0;
            background: #FFFFFF;
            color: #374151;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
        }
        .nav-button.primary {
            border-color: #C1A46C;
            background: #C1A46C;
            color: #1E2126;
        }
        @media (max-width: 640px) {
            .agent-page { padding: 4px 10px 10px; }
            .survey-card { padding: 16px; }
            .question-title { font-size: 21px; }
            .composer-actions { flex-direction: column; align-items: stretch; }
            .nav-button { width: 100%; }
        }
    </style>
</head>
<body>
<section class="agent-hero">
    <div class="agent-hero__inner">
        <div class="agent-hero__brand">ACE e-Counter</div>
        <div class="agent-hero__camera">
            <div class="agent-hero__camera-state">
                <div class="agent-hero__camera-eyebrow">Property assistant</div>
                <div class="agent-hero__camera-title">Tell us what you are looking for and we will guide you to the right next step.</div>
            </div>
        </div>
    </div>
</section>

<div class="agent-page" id="chat-app"
     th:attr="data-org-slug=${organization.slug},data-survey-slug=${surveySlug},data-sid=${sid},data-progress=${lead.surveyProgress},data-status=${lead.status},data-takeover=${lead.takeoverActive}">
    <div class="survey-card">
        <div class="survey-container">
            <div>
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <div id="progressText" class="progress-text">0% complete</div>
            </div>

            <div id="takeoverBanner" class="takeover-banner">Our team member has now entered the chat, you are speaking to a human.</div>

            <div>
                <h1 id="questionTitle" class="question-title" th:text="${isDefaultSurvey} ? 'What kind of property are you interested in?' : 'Let\'s continue with a few quick questions.'">What kind of property are you interested in?</h1>
                <p id="questionSubtitle" class="question-subtitle">Choose one of the quick starts below.</p>
            </div>

            <div id="surveyFlow" class="survey-answer">
                <div id="choicesGrid" class="choices-grid">
                    <button type="button" class="choice-button" data-choice="Buying a home">Buying a home</button>
                    <button type="button" class="choice-button" data-choice="Selling a property">Selling a property</button>
                    <button type="button" class="choice-button" data-choice="Renting">Renting</button>
                    <button type="button" class="choice-button" data-choice="Just exploring options">Just exploring options</button>
                </div>
            </div>

            <div id="takeoverChat" class="takeover-chat" style="display:none;">
                <div id="thread" class="thread"></div>

                <div class="composer">
                    <textarea id="takeoverInput" placeholder="Write your message here…"></textarea>
                    <div class="composer-actions">
                        <button id="takeoverSendButton" type="button" class="nav-button primary">Send message</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
(() => {
  const root = document.getElementById('chat-app');
  if (!root) return;

  const state = {
    orgSlug: root.dataset.orgSlug,
    surveySlug: root.dataset.surveySlug,
    sid: root.dataset.sid,
    progress: Number(root.dataset.progress || 0),
    takeoverActive: root.dataset.takeover === 'true',
    takeoverNoticeVisible: false,
    sending: false,
    since: 0,
    messageIds: new Set(),
    polling: false
  };

  const els = {
    progressFill: document.getElementById('progressFill'),
    progressText: document.getElementById('progressText'),
    takeoverBanner: document.getElementById('takeoverBanner'),
    questionTitle: document.getElementById('questionTitle'),
    questionSubtitle: document.getElementById('questionSubtitle'),
    surveyFlow: document.getElementById('surveyFlow'),
    choicesGrid: document.getElementById('choicesGrid'),
    thread: document.getElementById('thread'),
    input: document.getElementById('messageInput'),
    sendButton: document.getElementById('sendButton'),
    takeoverChat: document.getElementById('takeoverChat'),
    takeoverInput: document.getElementById('takeoverInput'),
    takeoverSendButton: document.getElementById('takeoverSendButton')
  };

  function renderBanner() {
    els.takeoverBanner.style.display = state.takeoverNoticeVisible ? 'block' : 'none';
    els.surveyFlow.style.display = state.takeoverActive ? 'none' : 'grid';
    els.takeoverChat.style.display = state.takeoverActive ? 'grid' : 'none';
    if (state.takeoverActive) {
      els.questionTitle.style.display = 'none';
      els.questionSubtitle.style.display = 'none';
    } else {
      els.questionTitle.style.display = 'block';
      els.questionSubtitle.style.display = 'block';
      els.questionTitle.textContent = 'What kind of property are you interested in?';
      els.questionSubtitle.textContent = 'Choose one of the quick starts below.';
    }
  }

  function renderProgress() {
    const pct = Math.max(0, Math.min(100, state.progress || 0));
    els.progressFill.style.width = pct + '%';
    els.progressText.textContent = pct + '% complete';
  }

  function appendMessage(role, text, timestamp) {
    const id = role + '|' + text + '|' + timestamp;
    if (state.messageIds.has(id)) return;
    state.messageIds.add(id);
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;
    bubble.innerHTML = `<div class="meta">${role}</div><div></div>`;
    bubble.querySelector('div:last-child').textContent = text || '';
    els.thread.appendChild(bubble);
    els.thread.scrollTop = els.thread.scrollHeight;
  }

  async function loadThread() {
    const res = await fetch(`/api/public/organizations/${encodeURIComponent(state.orgSlug)}/leads/${encodeURIComponent(state.sid)}/messages`, { credentials: 'same-origin' });
    if (!res.ok) return;
    const items = await res.json();
    els.thread.innerHTML = '';
    state.messageIds.clear();
    items.forEach(m => appendMessage(m.role, m.text, m.timestamp));
    if (items.some(m => m.role === 'staff')) {
      state.takeoverActive = true;
      state.takeoverNoticeVisible = true;
      renderBanner();
    }
  }

  function setChoicesDisabled(disabled) {
    els.choicesGrid.querySelectorAll('[data-choice]').forEach(button => {
      button.disabled = disabled;
    });
  }

  async function sendMessage(text) {
    const trimmed = (text || '').trim();
    if (!trimmed || state.sending) return;
    state.sending = true;
    if (state.takeoverActive) {
      appendMessage('user', trimmed, Date.now());
      els.takeoverInput.value = '';
    } else {
      setChoicesDisabled(true);
    }
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sid: state.sid,
          message: trimmed,
          tenant_slug: state.orgSlug,
          meta: { organization_slug: state.orgSlug, survey_slug: state.surveySlug }
        })
      });
      if (!res.ok) return;
      const data = await res.json();
      if (data.sid && data.sid !== state.sid) {
        state.sid = data.sid;
        root.dataset.sid = data.sid;
        history.replaceState({}, '', `/${state.orgSlug}/survey/${state.surveySlug}?sid=${encodeURIComponent(data.sid)}`);
      }
      state.progress = Number(data.surveyProgress || state.progress || 0);
      renderProgress();
      if (data.chatMode === 'open' && data.reply == null) {
        state.takeoverActive = true;
        renderBanner();
      }
      if (data.reply) {
        appendMessage('assistant', data.reply, Date.now());
        if (!state.takeoverActive) {
          els.questionTitle.textContent = data.reply;
          els.questionSubtitle.textContent = 'Your answer was saved.';
        }
      }
    } finally {
      state.sending = false;
      if (!state.takeoverActive) setChoicesDisabled(false);
    }
  }

  async function poll() {
    if (state.polling) return;
    state.polling = true;
    try {
      const res = await fetch(`/chat-events/poll?sid=${encodeURIComponent(state.sid)}&tenantSlug=${encodeURIComponent(state.orgSlug)}&since=${state.since}&timeout=20`, { credentials: 'same-origin' });
      if (!res.ok) return;
      const data = await res.json();
      (data.events || []).forEach(evt => {
        state.since = Math.max(state.since, evt._seq || 0);
        if (evt.type === 'message.created') {
          const role = evt.payload?.role || 'assistant';
          appendMessage(role, evt.payload?.text || '', evt.payload?.timestamp || evt.ts);
          if (role === 'staff') {
            state.takeoverActive = true;
            state.takeoverNoticeVisible = true;
            renderBanner();
            loadThread();
          }
        }
        if (evt.type === 'survey.paused' || evt.type === 'takeover.started') {
          loadThread();
        }
        if (evt.type === 'takeover.ended') {
          state.takeoverActive = false;
          state.takeoverNoticeVisible = false;
          renderBanner();
        }
        if (evt.type === 'lead.touched' && evt.payload?.survey_progress != null) {
          state.progress = Number(evt.payload.survey_progress || 0);
          renderProgress();
        }
      });
      state.since = Math.max(state.since, data.next || state.since);
    } finally {
      state.polling = false;
      setTimeout(poll, 250);
    }
  }

  if (els.sendButton && els.input) {
    els.sendButton.addEventListener('click', () => sendMessage(els.input.value));
    els.input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage(els.input.value);
      }
    });
  }

  els.takeoverSendButton.addEventListener('click', () => sendMessage(els.takeoverInput.value));

  els.takeoverInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(els.takeoverInput.value);
    }
  });
  els.choicesGrid.addEventListener('click', (e) => {
    const button = e.target.closest('[data-choice]');
    if (!button) return;
    sendMessage(button.dataset.choice || '');
  });

  renderProgress();
  renderBanner();
  loadThread().finally(poll);
})();
</script>
</body>
</html>
