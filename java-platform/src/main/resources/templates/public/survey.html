<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE e-Counter</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            color: #22252A;
            background: #0C0D10;
        }
        .agent-hero {
            padding: 10px 18px 4px;
            background:
                radial-gradient(1200px 400px at 18% -80px, rgba(193,164,108,.12), transparent 60%),
                linear-gradient(180deg, #121417 0%, #0C0D10 70%);
            border-bottom: 1px solid rgba(193,164,108,.18);
        }
        .agent-hero__inner {
            width: 100%;
            display: grid;
            gap: 8px;
        }
        .agent-hero__brand {
            width: 100%;
            color: rgba(250,250,247,.92);
            font-size: .92rem;
            line-height: 1;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            text-align: left;
        }
        .agent-hero__camera {
            width: min(100%, 520px);
            aspect-ratio: 16 / 9;
            justify-self: center;
            border-radius: 18px;
            background: #020303;
            border: 1px solid rgba(255,255,255,.09);
            box-shadow: 0 24px 60px rgba(0,0,0,.38);
            position: relative;
            overflow: hidden;
        }
        .agent-hero__camera-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            padding: 20px;
            background: linear-gradient(180deg, rgba(2,3,3,.18), rgba(2,3,3,.5));
            color: #F9FAFB;
        }
        .agent-hero__camera-eyebrow {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: rgba(249,250,251,.72);
        }
        .agent-hero__camera-title {
            font-size: clamp(16px, 2vw, 22px);
            font-weight: 700;
            line-height: 1.25;
            max-width: 28rem;
        }
        .agent-page {
            display: block;
            padding: 4px 14px 10px;
        }
        .survey-card {
            max-width: 920px;
            margin: 8px auto 12px;
            background: #FFFFFF;
            border: 1px solid #E6E2D6;
            border-radius: 16px;
            box-shadow: 0 24px 60px rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.12) inset;
            padding: 18px;
        }
        .survey-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 6px 0 4px;
        }
        .survey-progress {
            margin-bottom: 30px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #E7E1D2;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            width: 20%;
            background: linear-gradient(90deg, #C1A46C, #A98C58);
        }
        .progress-text {
            text-align: center;
            font-size: 14px;
            color: #6B7280;
        }
        .survey-question {
            margin-bottom: 28px;
        }
        .question-title {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            margin: 0 0 20px;
            line-height: 1.35;
            text-align: center;
        }
        .question-subtitle {
            margin: 0 0 22px;
            color: #6B7280;
            text-align: center;
            font-size: 15px;
        }
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .choice-button {
            padding: 16px 20px;
            border: 2px solid #E6E2D6;
            border-radius: 12px;
            background: #FFFFFF;
            font-size: 16px;
            color: #374151;
            text-align: left;
            font-weight: 600;
            box-shadow: 0 2px 6px rgba(17,19,23,.04);
        }
        .choice-button.active {
            border-color: #C1A46C;
            background: #FBF7EE;
            color: #5E4A20;
        }
        .survey-navigation {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 24px;
        }
        .nav-button {
            padding: 12px 18px;
            border-radius: 999px;
            border: 1px solid #D7D0C0;
            background: #FFFFFF;
            color: #374151;
            font-weight: 800;
        }
        .nav-button.primary {
            border-color: #C1A46C;
            background: #C1A46C;
            color: #1E2126;
        }
        @media (max-width: 640px) {
            .agent-page { padding: 4px 10px 10px; }
            .survey-card { padding: 16px; }
            .survey-container { padding: 0; }
            .question-title { font-size: 21px; }
            .survey-navigation { flex-direction: column; }
            .nav-button { width: 100%; }
        }
    </style>
</head>
<body>
<section class="agent-hero">
    <div class="agent-hero__inner">
        <div class="agent-hero__brand">ACE e-Counter</div>
        <div class="agent-hero__camera">
            <div class="agent-hero__camera-state">
                <div class="agent-hero__camera-eyebrow">Property assistant</div>
                <div class="agent-hero__camera-title">Tell us what you are looking for and we will guide you to the right next step.</div>
            </div>
        </div>
    </div>
</section>

<div class="agent-page">
    <div class="survey-card">
        <div class="survey-container">
            <div class="survey-progress">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="progress-text">Question 1 of 5</div>
            </div>

            <div class="survey-question">
                <h1 class="question-title" th:text="${isDefaultSurvey} ? 'What kind of property are you interested in?' : 'Let\'s continue with a few quick questions.'">What kind of property are you interested in?</h1>
                <p class="question-subtitle" th:text="${isDefaultSurvey} ? 'Choose the option that best matches your search.' : 'We will use your answers to tailor the next steps.'">Choose the option that best matches your search.</p>

                <div class="choices-container">
                    <button type="button" class="choice-button active">Buying a home</button>
                    <button type="button" class="choice-button">Selling a property</button>
                    <button type="button" class="choice-button">Renting</button>
                    <button type="button" class="choice-button">Just exploring options</button>
                </div>
            </div>

            <div class="survey-navigation">
                <button type="button" class="nav-button">Back</button>
                <button type="button" class="nav-button primary">Next</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
